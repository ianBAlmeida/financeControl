<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Aplicativo básico desenvolvido em Flutter/Dart para controle financeiro.">

  <!-- iOS/PWA -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3C1186">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="finance_control">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <title>finance_control</title>

  <style>
    :root {
      --notch-color: #3C1186; /* cor do topo do app */
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: transparent;
    }

    /* fallback notch iOS: cobre apenas safe-area top, sem mexer no layout */
    #ios-notch-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: env(safe-area-inset-top, 0px);
      background: var(--notch-color);
      z-index: 2147483647;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ios-notch-overlay"></div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
