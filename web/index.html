<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="finance_control">

  <!-- PWA / iOS -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#3C1186">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="finance_control">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>finance_control</title>

  <style>
    :root {
      --notch-color: #3C1186; /* ajuste aqui se quiser outra cor do topo */
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
    }

    /* só pinta a área do notch, sem empurrar layout */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: env(safe-area-inset-top);
      background: var(--notch-color);
      z-index: 9999;
      pointer-events: none;
    }
  </style>
</head>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
